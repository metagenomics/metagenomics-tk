tempdir: "tmp"
s3SignIn: false
output: "output"
logDir: log
runid: 1
logLevel: 1
scratch: "/vol/scratch"
publishDirMode: "symlink"
steps:
  multiBinningONT:
    input:
      reads: test_data/multiBinningONT/samplesONT.tsv
      contigs: test_data/multiBinningONT/assemblyONT.tsv
      quality: test_data/multiBinningONT/quality.tsv
      groups: test_data/multiBinningONT/groups.tsv
    minimap:
      additionalParams: 
        minimap: " "
        # samtools flags are used to filter resulting bam file
        samtoolsView: " " 
    contigsCoverage:
      additionalParams: " "
    genomeCoverage:
      additionalParams: " --min-covered-fraction 0 "
    semibin2:
      additionalParams: 
        featureGeneration: " "
        training: " "
        binning: " "
resources:
  highmemLarge:
    cpus: 28
    memory: 230
  highmemMedium:
    cpus: 14
    memory: 113
  large:
    cpus: 28
    memory: 58
  medium:
    cpus: 14
    memory: 29
  small:
    cpus: 7
    memory: 14
  tiny:
    cpus: 1
    memory: 1
