tempdir: "tmp"
s3SignIn: false
output: "output"
logDir: log
runid: 1
logLevel: 1
scratch: "/vol/scratch"
publishDirMode: "symlink"
steps:
  binning:
    input:
      paired: test_data/binning/samples.tsv
      single: test_data/binning/samplesUnpaired.tsv
      contigs: test_data/binning/assembly.tsv
    bwa2:
      additionalParams: 
        bwa2: "   "
        # samtools flags are used to filter resulting bam file
        samtoolsView: "  -F 3584  "
    contigsCoverage:
      additionalParams: " "
    genomeCoverage:
      additionalParams: " "
    metabat:
      additionalParams: " --seed 234234  "
resources:
  highmemLarge:
    cpus: 28
    memory: 230
  highmemMedium:
    cpus: 14
    memory: 113
  large:
    cpus: 28
    memory: 58
  medium:
    cpus: 14
    memory: 29
  small:
    cpus: 7
    memory: 14
  tiny:
    cpus: 1
    memory: 1
