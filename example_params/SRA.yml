tempdir: "tmp"
output: "output"
runid: 1
logDir: log
s3SignIn: true
scratch: "/vol/scratch"
publishDirMode: "symlink"
input:
  SRA:
    pattern:
      ont: ".+[^(_1|_2)].+fastq.gz$"
      illumina: ".+(_1|_2).+fastq.gz$"
    S3:
      sheet: test_data/SRA/samples.tsv 
      bucket: "s3://meta_test" 
      prefix: "/vol1/fastq/"
      watch: false
    NCBI:
      sheet: test_data/SRA/ncbi_samples.tsv 
  paired:
    sheet: "test_data/fullPipeline/reads_split.tsv"
    watch: false
  ont:
    sheet: "test_data/fullPipeline/ont.tsv"
    watch: false
